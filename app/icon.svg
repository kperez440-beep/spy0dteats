<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="5" y1="24" x2="32" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#063B47"/>
      <stop offset="30%" stop-color="#06B6D4"/>
      <stop offset="62%" stop-color="#F0B429"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <filter id="lg" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
    </filter>
    <filter id="sg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pg" x="-350%" y="-350%" width="800%" height="800%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect width="40" height="40" rx="8" fill="#0D1520"/>
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="7.5" stroke="#F0B429" stroke-width="1" stroke-opacity="0.38" fill="none"/>

  <!-- Pivot ambient glow -->
  <circle cx="15" cy="31" r="7" fill="#F0B429" filter="url(#pg)" opacity="0.28"/>

  <!-- Line bloom -->
  <polyline points="5,24 15,31 32,8" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#lg)" opacity="0.5"/>

  <!-- Line crisp -->
  <polyline points="5,24 15,31 32,8" stroke="url(#g)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Star halo -->
  <circle cx="32" cy="8" r="5.5" fill="#F0B429" filter="url(#sg)" opacity="0.4"/>

  <!-- 8-point star at tip (R=3.5, r=1.1) -->
  <path d="M32,4.5 L32.42,6.98 L34.47,5.53 L33.02,7.58 L35.5,8 L33.02,8.42 L34.47,10.47 L32.42,9.02 L32,11.5 L31.58,9.02 L29.53,10.47 L30.98,8.42 L28.5,8 L30.98,7.58 L29.53,5.53 L31.58,6.98 Z" fill="#F0B429" filter="url(#sg)"/>

  <!-- Bright center -->
  <circle cx="32" cy="8" r="1.25" fill="white" opacity="0.96"/>
</svg>
